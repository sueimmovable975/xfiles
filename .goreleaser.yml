# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: xftp
    main: ./cmd/xftp
    binary: xftp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: xcp
    main: ./cmd/xcp
    binary: xcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: xfind
    main: ./cmd/xfind
    binary: xfind
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: xtree
    main: ./cmd/xtree
    binary: xtree
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: xsync
    main: ./cmd/xsync
    binary: xsync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: xftp
    ids:
      - xftp
    name_template: "xftp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
  - id: xcp
    ids:
      - xcp
    name_template: "xcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
  - id: xfind
    ids:
      - xfind
    name_template: "xfind_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
  - id: xtree
    ids:
      - xtree
    name_template: "xtree_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
  - id: xsync
    ids:
      - xsync
    name_template: "xsync_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: xftp
    ids:
      - xftp
    package_name: xftp
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      xftp — an FTP-client feel for SharePoint document libraries.
      Connect to a site and move files with ls/cd/get/put/mkdir/rm/mv
      over Microsoft Graph. Device-code auth; large files stream through
      resumable upload sessions.
    homepage: https://github.com/excelano/xfiles
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xftp/copyright
      - src: ./README.md
        dst: /usr/share/doc/xftp/README.md
  - id: xcp
    ids:
      - xcp
    package_name: xcp
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      xcp — an scp-style one-shot copy for SharePoint document libraries.
      Copy a file to or from a library in a single command over Microsoft
      Graph; direction is set by which argument is the URL. Device-code
      auth; large files stream through resumable upload sessions.
    homepage: https://github.com/excelano/xfiles
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xcp/copyright
      - src: ./README.md
        dst: /usr/share/doc/xcp/README.md
  - id: xfind
    ids:
      - xfind
    package_name: xfind
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      xfind — the find(1) of the xftp family for SharePoint libraries.
      Walk a document library recursively and print matching paths, filtered
      by name, type, or depth, over Microsoft Graph. Device-code auth.
    homepage: https://github.com/excelano/xfiles
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xfind/copyright
      - src: ./README.md
        dst: /usr/share/doc/xfind/README.md
  - id: xtree
    ids:
      - xtree
    package_name: xtree
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      xtree — the tree(1) of the xftp family for SharePoint libraries.
      Print a document library as an indented tree with a directory/file
      summary, over Microsoft Graph. Device-code auth.
    homepage: https://github.com/excelano/xfiles
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xtree/copyright
      - src: ./README.md
        dst: /usr/share/doc/xtree/README.md
  - id: xsync
    ids:
      - xsync
    package_name: xsync
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      xsync — the rsync of the xftp family for SharePoint libraries.
      Recursively mirror a directory tree to or from a document library,
      transferring only new or changed files (by size and mtime), with
      --delete and --dry-run, over Microsoft Graph. Device-code auth.
    homepage: https://github.com/excelano/xfiles
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xsync/copyright
      - src: ./README.md
        dst: /usr/share/doc/xsync/README.md

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship install.sh alongside the platform tarballs so users can pin to a
  # specific release URL instead of relying on the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
